name: 3D Contribution

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: write   # 🔥 REQUIRED (fixes git 128 error)

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Generate 3D Contribution
        uses: yoshi389111/github-profile-3d-contrib@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: bikashdasha

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4   # 🔥 upgraded version
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./profile-3d-contrib
          force_orphan: true
